spring.application.name=SistemaDeVendas

# Banco de dados — usa variável de ambiente em produção, fallback local em desenvolvimento
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sistemadevendas?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# DDL: "update" para desenvolvimento; em produção use "validate" com Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# SQL logging: controlado via variável de ambiente
spring.jpa.show-sql=${SHOW_SQL:false}
logging.level.org.hibernate.SQL=${LOG_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql=${LOG_SQL_TYPES:WARN}

# REMOVIDO: spring.security.user.name e spring.security.user.password
# A autenticação agora é gerenciada pelo JdbcUserDetailsManager (banco de dados)
